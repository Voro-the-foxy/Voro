services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: voro
      POSTGRES_USER: voro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voro"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://voro:${POSTGRES_PASSWORD}@postgres:5432/voro?sslmode=disable
      AI_SERVER_URL: http://ai-server:8000
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ai-server:
    build:
      context: ../ai-server
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://voro:${POSTGRES_PASSWORD}@postgres:5432/voro
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
